/slam_gmapping:
  ros__parameters:
    use_sim_time: false
    base_frame: base_footprint
    odom_frame: odom
    map_frame: map

    map_update_interval: 2.0
    transform_publish_period: 0.05
    throttle_scans: 1

    maxRange: 12.0
    maxUrange: 10.0
    sigma: 0.05
    kernelSize: 1
    lstep: 0.05
    astep: 0.05
    iterations: 5
    lsigma: 0.075
    ogain: 3.0
    lskip: 0
    minimum_score: 50.0

    srr: 0.1
    srt: 0.2
    str: 0.1
    stt: 0.2

    linearUpdate: 0.4
    angularUpdate: 0.3
    temporalUpdate: 1.0
    resampleThreshold: 0.5
    particles: 30

    xmin: -20.0
    ymin: -20.0
    xmax: 20.0
    ymax: 20.0
    delta: 0.05
    occ_thresh: 0.25

    llsamplerange: 0.01
    llsamplestep: 0.01
    lasamplerange: 0.005
    lasamplestep: 0.005
