# Experimental localization/controller tuning. Kept separate so the default
# navigation config can stay on the more stable baseline.
amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.35
    alpha2: 0.25
    alpha3: 0.25
    alpha4: 0.35
    alpha5: 0.2
    base_frame_id: base_footprint
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: map
    lambda_short: 0.1
    laser_likelihood_max_dist: 1.5
    laser_max_range: 12.0
    laser_min_range: 0.05
    laser_model_type: likelihood_field
    max_beams: 120
    max_particles: 3000
    min_particles: 800
    odom_frame_id: odom
    pf_err: 0.03
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: nav2_amcl::DifferentialMotionModel
    save_pose_rate: 0.5
    sigma_hit: 0.12
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.08
    update_min_d: 0.05
    z_hit: 0.75
    z_max: 0.05
    z_rand: 0.20
    z_short: 0.05
    scan_topic: /scan
