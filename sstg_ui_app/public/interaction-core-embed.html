<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interaction Manager Core — Interactive Demo</title>
  <style>
    :root {
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.92);
      --ink: #e2e8f0;
      --muted: #94a3b8;
      --line: rgba(148, 163, 184, 0.12);
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--ink); background: var(--bg); padding: 0; overflow: hidden;
    }
    .shell { width: 100%; height: 100vh; display: flex; flex-direction: column; }
    .toolbar {
      display: flex; gap: 12px; align-items: center;
      padding: 10px 20px; border-bottom: 1px solid var(--line);
      background: rgba(15,23,42,0.6); backdrop-filter: blur(8px); flex-shrink: 0;
    }
    .toggle {
      display: inline-flex; background: rgba(30,41,59,0.8);
      border: 1px solid var(--line); border-radius: 999px; padding: 3px;
    }
    .toggle button {
      border: 0; background: transparent; color: var(--muted);
      padding: 7px 14px; border-radius: 999px; cursor: pointer;
      font-size: 12px; font-weight: 700; transition: all 140ms ease; white-space: nowrap;
    }
    .toggle button.active { background: #f97316; color: white; }
    .viz-wrap { flex: 1; overflow: hidden; position: relative;
      background: linear-gradient(rgba(148,163,184,0.03) 1px,transparent 1px),
                  linear-gradient(90deg,rgba(148,163,184,0.03) 1px,transparent 1px);
      background-size: 40px 40px;
    }
    .state-hidden { opacity: 0; pointer-events: none; position: absolute; top:0;left:0;right:0;bottom:0; }
    .state-visible { opacity: 1; pointer-events: auto; }

    /* ═══ Common interactive scene layout ═══ */
    .scene-interactive {
      width:100%; height:100%; display:flex; flex-direction:column;
      position:absolute; top:0; left:0;
    }
    .scene-bar {
      display:flex; gap:10px; align-items:center; padding:8px 20px;
      border-bottom:1px solid var(--line); background:rgba(15,23,42,0.5); flex-shrink:0;
    }
    .scene-body { flex:1; display:flex; overflow:hidden; }
    .scene-svg-area { flex:1; position:relative; overflow:hidden; }
    .scene-svg-area svg { width:100%; height:100%; display:block; }
    .scene-panel {
      width:260px; flex-shrink:0; border-left:1px solid var(--line);
      background:rgba(15,23,42,0.7); display:flex; flex-direction:column; overflow:hidden;
    }
    .panel-header {
      padding:10px 14px; font-size:11px; font-weight:800; color:#cbd5e1;
      border-bottom:1px solid var(--line); flex-shrink:0;
    }
    .panel-body {
      flex:1; overflow-y:auto; padding:8px 12px; font-size:11px;
      color:var(--muted); line-height:1.7;
    }
    .panel-body::-webkit-scrollbar { width:4px; }
    .panel-body::-webkit-scrollbar-thumb { background:rgba(148,163,184,0.2); border-radius:2px; }

    /* Buttons */
    .sc-btn {
      border:1px solid var(--line); background:rgba(30,41,59,0.6);
      color:var(--muted); padding:5px 14px; border-radius:8px;
      cursor:pointer; font-size:11px; font-weight:700; transition:all 200ms ease;
      display:flex; align-items:center; gap:5px;
    }
    .sc-btn:hover { border-color:rgba(148,163,184,0.3); color:var(--ink); }
    .sc-btn:disabled { opacity:0.35; cursor:not-allowed; }
    .sc-btn.on { border-color:#f97316; background:rgba(249,115,22,0.15); color:#fdba74; }
    .sc-btn .dot { width:7px;height:7px;border-radius:50%;display:inline-block; }
    .reset-btn {
      border:1px solid var(--line); background:rgba(30,41,59,0.4);
      color:var(--muted); padding:5px 12px; border-radius:8px;
      cursor:pointer; font-size:10px; font-weight:700; margin-left:auto; transition:all 150ms;
    }
    .reset-btn:hover { color:var(--ink); border-color:rgba(148,163,184,0.3); }

    /* ═══ SVG Flow styles (shared) ═══ */
    @keyframes pulse-ring { 0% { r:62; opacity:0.15; } 100% { r:85; opacity:0; } }
    @keyframes dash { to { stroke-dashoffset:-28; } }
    @keyframes node-pulse {
      0%,100% { filter:drop-shadow(0 0 6px var(--gc,#3b82f6)); opacity:1; }
      50% { filter:drop-shadow(0 0 20px var(--gc,#3b82f6)); opacity:0.85; }
    }
    @keyframes celebrate { 0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)} }
    @keyframes blink-cursor { 0%,100%{opacity:1}50%{opacity:0} }
    @keyframes dash-reverse { to { stroke-dashoffset:28; } }
    @keyframes log-in { to { opacity:1; transform:translateY(0); } }

    .fn { transition: all 0.4s cubic-bezier(0.4,0,0.2,1); }
    .fn rect,.fn circle { transition: all 0.4s cubic-bezier(0.4,0,0.2,1); }
    .fn.dim { opacity:0.12; }
    .fn.idle { opacity:0.4; }
    .fn.active rect,.fn.active circle { filter:drop-shadow(0 0 10px var(--gc,#3b82f6)); }
    .fn.processing rect,.fn.processing circle { animation:node-pulse 1.2s ease-in-out infinite; }
    .fn.completed rect,.fn.completed circle { fill:rgba(16,185,129,0.2)!important; stroke:rgba(16,185,129,0.5)!important; filter:drop-shadow(0 0 8px #10b981); }
    .fn.completed text { fill:#6ee7b7!important; }
    .fn.highlight rect,.fn.highlight circle { filter:drop-shadow(0 0 14px var(--gc,#f97316)); }
    .fe { opacity:0.1; transition:opacity 0.4s ease; }
    .fe.active { opacity:1; }
    .fe.dim { opacity:0.05; }
    .flow-particle { display:none; }
    .flow-particle.visible { display:block; }
    .msg-bubble { opacity:0; transition:opacity 0.35s ease; pointer-events:none; }
    .msg-bubble.visible { opacity:1; }

    .log-entry { opacity:0; transform:translateY(6px); animation:log-in 300ms ease forwards;
      padding:3px 0; border-bottom:1px solid rgba(148,163,184,0.05); }
    .log-entry .log-time { color:#64748b; font-family:monospace; font-size:10px; margin-right:6px; }
    .log-entry .log-text { color:#cbd5e1; }

    .tw-cursor { animation:blink-cursor 0.7s step-end infinite; }
    .progress-fill { transition:width 0.6s cubic-bezier(0.4,0,0.2,1); }

    /* ═══ Scene 1: Hub clickable nodes ═══ */
    .hub-node { cursor:pointer; transition:all 0.3s ease; }
    .hub-node:hover rect { filter:drop-shadow(0 0 8px var(--gc,#3b82f6)); }
    .hub-node.selected rect { filter:drop-shadow(0 0 14px var(--gc,#3b82f6)); stroke-width:2.5; }
    .hub-edge { fill:none; stroke-width:2; stroke-linecap:round; opacity:0.15; transition:opacity 0.4s; }
    .hub-edge-anim { fill:none; stroke-width:1.2; stroke-linecap:round; stroke-dasharray:6 8; opacity:0; transition:opacity 0.4s; }
    .hub-edge.lit { opacity:1; }
    .hub-edge-anim.lit { opacity:1; animation:dash 1.2s linear infinite; }
    .hub-detail { padding:8px 0; }
    .hub-detail h3 { font-size:13px; font-weight:800; margin-bottom:4px; }
    .hub-detail .tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:9px;
      font-weight:700; margin:2px 2px 2px 0; }
    .hub-detail table { width:100%; border-collapse:collapse; margin-top:6px; }
    .hub-detail td { padding:3px 4px; font-size:10px; border-bottom:1px solid rgba(148,163,184,0.08); }
    .hub-detail td:first-child { color:#64748b; width:65px; }

    /* ═══ Scene 3: State Machine ═══ */
    .sm-node-i { transition:all 0.4s ease; }
    .sm-node-i.dim { opacity:0.15; }
    .sm-node-i.idle { opacity:0.35; }
    .sm-node-i.active rect { filter:drop-shadow(0 0 12px var(--gc,#94a3b8)); stroke-width:2.5; }
    .sm-node-i.completed rect { fill:rgba(16,185,129,0.2)!important; stroke:rgba(16,185,129,0.5)!important; filter:drop-shadow(0 0 8px #10b981); }
    .sm-node-i.completed text { fill:#6ee7b7!important; }
    .sm-edge-i { fill:none; stroke-width:2; stroke-linecap:round; opacity:0.1; transition:opacity 0.4s; }
    .sm-edge-i.active { opacity:1; }
  </style>
</head>
<body>
<div class="shell">
  <div class="toolbar">
    <div class="toggle" role="tablist">
      <button id="btn-hub" class="active" type="button">Core Hub 总览</button>
      <button id="btn-flow" type="button">任务链路演示</button>
      <button id="btn-state" type="button">状态机演示</button>
    </div>
    <span style="font-size:11px;color:var(--muted);margin-left:auto">interaction_manager — 系统编排核心 · 交互式演示</span>
  </div>
  <div class="viz-wrap">

<!-- ╔══════════════════════════════════════════════════╗
     ║  SCENE 1 — Interactive Core Hub                 ║
     ╚══════════════════════════════════════════════════╝ -->
<div id="scene-hub" class="scene-interactive state-visible">

    <span style="font-size:11px;color:#fb923c;font-weight:800">点击任意节点查看详情和数据流动</span>
    <button class="sc-btn" id="hub-play-all" type="button"><span class="dot" style="background:#f97316"></span>自动巡演</button>
    <button class="reset-btn" id="hub-reset" type="button">↻ 重置</button>
  </div>
  <div class="scene-body">
    <div class="scene-svg-area">

        <defs>
          <marker id="ha-o" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#f97316"/></marker>
          <marker id="ha-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#3b82f6"/></marker>
          <marker id="ha-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#10b981"/></marker>
          <marker id="ha-p" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#8b5cf6"/></marker>
          <marker id="ha-a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#eab308"/></marker>
          <marker id="ha-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#ef4444"/></marker>
        </defs>

        <!-- Central core -->

        <circle cx="440" cy="310" r="62" fill="none" stroke="#f97316" stroke-width="3" opacity="0.3"/>
        <circle cx="440" cy="310" r="56" fill="rgba(249,115,22,0.12)" stroke="#f97316" stroke-width="2.5"/>
        <text x="440" y="302" text-anchor="middle" style="font-size:16px;font-weight:900;fill:#fb923c">Interaction</text>
        <text x="440" y="322" text-anchor="middle" style="font-size:16px;font-weight:900;fill:#fb923c">Manager</text>
        <text x="440" y="344" text-anchor="middle" style="font-size:11px;fill:#fdba74">Core Hub</text>

        <!-- ── Edges (drawn under nodes) ── -->

        <path id="hea-ui-core" class="hub-edge-anim" d="M380 80 L415 250" stroke="#3b82f6"/>

        <path id="hea-core-nlp" class="hub-edge-anim" d="M382 295 L230 215" stroke="#8b5cf6"/>
        <!-- NLP → Core (return) -->
        <path id="he-nlp-core" class="hub-edge" d="M230 225 L385 305" stroke="#8b5cf6" opacity="0.3"/>
        <!-- Core → Planner -->
        <path id="he-core-planner" class="hub-edge" d="M382 320 L230 335" stroke="#3b82f6" marker-end="url(#ha-b)"/>
        <path id="hea-core-planner" class="hub-edge-anim" d="M382 320 L230 335" stroke="#3b82f6"/>
        <!-- Core → MapManager -->
        <path id="he-core-map" class="hub-edge" d="M395 365 L230 445" stroke="#10b981" marker-end="url(#ha-g)"/>
        <path id="hea-core-map" class="hub-edge-anim" d="M395 365 L230 445" stroke="#10b981"/>
        <!-- Core → Executor -->
        <path id="he-core-exec" class="hub-edge" d="M498 305 L640 280" stroke="#eab308" marker-end="url(#ha-a)"/>
        <path id="hea-core-exec" class="hub-edge-anim" d="M498 305 L640 280" stroke="#eab308"/>
        <!-- Executor → Core (feedback) -->
        <path id="he-exec-core" class="hub-edge" d="M640 300 L498 318" stroke="#eab308" opacity="0.3"/>
        <!-- Core → Explorer -->
        <path id="he-core-explorer" class="hub-edge" d="M498 340 L640 395" stroke="#f97316" marker-end="url(#ha-o)"/>
        <path id="hea-core-explorer" class="hub-edge-anim" d="M498 340 L640 395" stroke="#f97316"/>
        <!-- Core → Perception -->
        <path id="he-core-perception" class="hub-edge" d="M440 372 L440 490" stroke="#ef4444" marker-end="url(#ha-r)"/>
        <path id="hea-core-perception" class="hub-edge-anim" d="M440 372 L440 490" stroke="#ef4444"/>
        <!-- Core → SysManager -->
        <path id="he-core-sys" class="hub-edge" d="M498 280 L640 170" stroke="#10b981" marker-end="url(#ha-g)"/>
        <path id="hea-core-sys" class="hub-edge-anim" d="M498 280 L640 170" stroke="#10b981"/>

        <!-- Edge labels (hidden by default, shown on click) -->
        <text id="hl-ui" x="370" y="165" style="font-size:9px;font-weight:700;fill:#93c5fd;opacity:0;transition:opacity 0.3s;paint-order:stroke;stroke:rgba(2,6,23,0.85);stroke-width:3">/start_task</text>
        <text id="hl-ui2" x="490" y="165" style="font-size:9px;font-weight:700;fill:#fdba74;opacity:0;transition:opacity 0.3s;paint-order:stroke;stroke:rgba(2,6,23,0.85);stroke-width:3">/task_status</text>
        <text id="hl-nlp" x="280" y="248" style="font-size:9px;font-weight:700;fill:#c4b5fd;opacity:0;transition:opacity 0.3s;paint-order:stroke;stroke:rgba(2,6,23,0.85);stroke-width:3">/process_nlp_query</text>

        <text id="hl-map" x="280" y="415" style="font-size:9px;font-weight:700;fill:#6ee7b7;opacity:0;transition:opacity 0.3s;paint-order:stroke;stroke:rgba(2,6,23,0.85);stroke-width:3">/get_node_pose</text>
        <text id="hl-exec" x="555" y="280" style="font-size:9px;font-weight:700;fill:#fde68a;opacity:0;transition:opacity 0.3s;paint-order:stroke;stroke:rgba(2,6,23,0.85);stroke-width:3">/execute_navigation</text>
        <text id="hl-exec2" x="555" y="310" style="font-size:9px;font-weight:700;fill:#fde68a;opacity:0;transition:opacity 0.3s;paint-order:stroke;stroke:rgba(2,6,23,0.85);stroke-width:3">/nav_feedback</text>
        <text id="hl-explorer" x="555" y="375" style="font-size:9px;font-weight:700;fill:#fdba74;opacity:0;transition:opacity 0.3s;paint-order:stroke;stroke:rgba(2,6,23,0.85);stroke-width:3">ExploreHome.action</text>
        <text id="hl-perception" x="448" y="440" style="font-size:9px;font-weight:700;fill:#fca5a5;opacity:0;transition:opacity 0.3s;paint-order:stroke;stroke:rgba(2,6,23,0.85);stroke-width:3">/capture + /check</text>
        <text id="hl-sys" x="560" y="222" style="font-size:9px;font-weight:700;fill:#6ee7b7;opacity:0;transition:opacity 0.3s;paint-order:stroke;stroke:rgba(2,6,23,0.85);stroke-width:3">/launch_mode</text>

        </g>
        <!-- Executor -->

          <text x="352" y="530" style="font-size:9px;fill:#f87171">全景采集 + VLM 物体确认</text>

        <!-- System Manager -->
        <g id="hn-sys" class="hub-node" style="--gc:#10b981" data-node="sys">

          <text x="662" y="166" style="font-size:12px;font-weight:800;fill:#6ee7b7">system_manager</text>

        </g>

        <!-- Particle -->
        <circle id="hub-particle" class="flow-particle" r="5" cx="0" cy="0" fill="white" filter="url(#glow-white-h)"/>
        <defs><filter id="glow-white-h"><feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#fff" flood-opacity="0.8"/></filter></defs>

        <!-- Bottom labels -->
        <rect rx="8" x="320" y="570" width="240" height="24" fill="rgba(249,115,22,0.08)" stroke="rgba(249,115,22,0.15)"/>
        <text x="340" y="587" style="font-size:9px;font-weight:700;fill:#fdba74">Watchdog 30s heartbeat · Task Queue max 5</text>
      </svg>
    </div>
    <div class="scene-panel">
      <div class="panel-header">📖 节点详情</div>
      <div class="panel-body" id="hub-detail">
        <div style="text-align:center;padding:40px 10px;color:#64748b">
          <div style="font-size:28px;margin-bottom:8px">👆</div>
          <div style="font-size:12px">点击左侧任意节点<br>查看服务接口详情</div>
        </div>
      </div>
    </div>
  </div>

<script>
/* ═══════════════════════════════════════════════════════
   SHARED UTILITIES
   ═══════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }

function makeDelayFn(signal) {
  return ms => new Promise((resolve, reject) => {
    const timer = setTimeout(resolve, ms);
    if (signal) signal.addEventListener('abort', () => { clearTimeout(timer); reject(new DOMException('Aborted','AbortError')); });
  });
}

function makeParticleFn(particleEl, signal) {
  return (pathId, duration, color) => new Promise((resolve, reject) => {
    const path = $(pathId);
    if (!path) { resolve(); return; }
    path.style.display = '';
    const length = path.getTotalLength();
    particleEl.classList.add('visible');
    particleEl.style.fill = color || 'white';
    particleEl.style.filter = `drop-shadow(0 0 6px ${color || 'white'})`;
    const t0 = performance.now();
    let raf;
    function tick(now) {
      if (signal && signal.aborted) { cancelAnimationFrame(raf); reject(new DOMException('Aborted','AbortError')); return; }
      const t = Math.min((now-t0)/duration, 1);
      const pt = path.getPointAtLength(easeInOutCubic(t)*length);
      particleEl.setAttribute('cx', pt.x);
      particleEl.setAttribute('cy', pt.y);
      if (t < 1) raf = requestAnimationFrame(tick);
      else { particleEl.classList.remove('visible'); resolve(); }
    }
    raf = requestAnimationFrame(tick);
  });
}

function makeLogFn(container, startTimeFn) {
  return (icon, text) => {
    const t = ((performance.now() - startTimeFn()) / 1000).toFixed(1);
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `<span class="log-time">${t}s</span><span class="log-text">${icon} ${text}</span>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  };
}

  async function startChain(chain) {
    if (flowPlaying) return;
    flowPlaying = true; flowAbort = new AbortController(); flowStart = performance.now();
    delay = makeDelayFn(flowAbort.signal);
    animP = makeParticleFn(particle, flowAbort.signal);
    addLog = makeLogFn(logBody, () => flowStart);
    ['chain-nav','chain-explore','chain-search'].forEach(id => $(id).disabled = true);
    const map = {nav:'chain-nav',explore:'chain-explore',search:'chain-search'};
    $(map[chain]).classList.add('on');
    try {
      if(chain==='nav') await playNavigate();
      else if(chain==='explore') await playExplore();
      else if(chain==='search') await playSearch();
    } catch(e) { if(e.name!=='AbortError') console.error(e); }
    flowPlaying = false;
    ['chain-nav','chain-explore','chain-search'].forEach(id => $(id).disabled = false);
  }

  $('chain-nav').addEventListener('click', () => startChain('nav'));
  $('chain-explore').addEventListener('click', () => startChain('explore'));
  $('chain-search').addEventListener('click', () => startChain('search'));
  $('chain-reset').addEventListener('click', flowReset);
  flowReset();
})();

/* ╔══════════════════════════════════════════════════╗
   ║  SCENE 3 ENGINE — State Machine Animation       ║
   ╚══════════════════════════════════════════════════╝ */
;(function(){
  let smAbort = null;
  let smPlaying = false;
  let smStart = 0;
  const smParticle = $('sm-particle');
  const smLog = $('sm-log');

  const allSmNodes = ['sm-idle','sm-understanding','sm-planning','sm-navigating','sm-exploring','sm-searching','sm-checking','sm-completed','sm-failed','sm-canceled'];
  const allSmEdges = ['se-idle-understanding','se-understanding-planning','se-understanding-exploring','se-understanding-searching','se-planning-navigating','se-searching-checking','se-checking-searching','se-navigating-completed','se-exploring-completed','se-checking-completed'];
  const allSmLabels = ['sl-idle-understanding','sl-understanding-planning','sl-understanding-exploring','sl-understanding-searching','sl-planning-navigating','sl-searching-checking','sl-checking-searching'];

  function smReset() {
    if(smAbort) smAbort.abort();
    smAbort=null; smPlaying=false;
    ['sm-nav','sm-explore','sm-search'].forEach(id=>{$(id).classList.remove('on');$(id).disabled=false;});
    allSmNodes.forEach(id=>$(id).className.baseVal='sm-node-i idle');
    allSmEdges.forEach(id=>{const el=$(id);if(el)el.className.baseVal='sm-edge-i';});
    allSmLabels.forEach(id=>{const el=$(id);if(el)el.style.opacity='0';});
    smParticle.classList.remove('visible');
    smLog.innerHTML='<div style="text-align:center;padding:40px 10px;color:#64748b"><div style="font-size:28px;margin-bottom:8px">⚡</div><div style="font-size:12px">点击上方链路按钮<br>观看状态转换动画</div></div>';
  }

  function smSetNode(id,cls){ $(id).className.baseVal='sm-node-i '+cls; }
  function smSetEdge(id,on){ const el=$(id); if(el) el.className.baseVal=on?'sm-edge-i active':'sm-edge-i'; }
  function smShowLabel(id){ const el=$(id); if(el) el.style.opacity='1'; }

  async function smPlayNav() {
    const delay=makeDelayFn(smAbort.signal);
    const animP=makeParticleFn(smParticle,smAbort.signal);
    const log=makeLogFn(smLog,()=>smStart);

    // All dim first
    allSmNodes.forEach(id=>smSetNode(id,'dim'));
    allSmEdges.forEach(id=>smSetEdge(id,false));
    allSmLabels.forEach(id=>{const el=$(id);if(el)el.style.opacity='0';});

    // IDLE
    smSetNode('sm-idle','active'); log('⚪','状态: IDLE → 收到 start_task()'); await delay(1000);

    // → UNDERSTANDING
    smSetEdge('se-idle-understanding',true); smShowLabel('sl-idle-understanding');
    await animP('se-idle-understanding',600,'#8b5cf6');
    smSetNode('sm-idle','completed'); smSetNode('sm-understanding','active');
    log('🟣','状态: UNDERSTANDING — NLP 解析中'); await delay(1200);

    // → PLANNING
    smSetEdge('se-understanding-planning',true); smShowLabel('sl-understanding-planning');
    await animP('se-understanding-planning',600,'#3b82f6');
    smSetNode('sm-understanding','completed'); smSetNode('sm-planning','active');
    log('🔵','状态: PLANNING — 规划路径'); await delay(1200);

    // → NAVIGATING
    smSetEdge('se-planning-navigating',true); smShowLabel('sl-planning-navigating');
    await animP('se-planning-navigating',600,'#eab308');
    smSetNode('sm-planning','completed'); smSetNode('sm-navigating','active');
    log('🟡','状态: NAVIGATING — 执行导航'); await delay(1500);

    // → COMPLETED
    smSetEdge('se-navigating-completed',true);
    await animP('se-navigating-completed',600,'#10b981');
    smSetNode('sm-navigating','completed'); smSetNode('sm-completed','active');
    $('sm-completed').classList.add('celebrate');
    log('🟢','状态: COMPLETED — 到达目标!'); await delay(500);
    log('🎉','navigate_to 状态链路演示完成');
  }

  async function smPlayExplore() {
    const delay=makeDelayFn(smAbort.signal);
    const animP=makeParticleFn(smParticle,smAbort.signal);
    const log=makeLogFn(smLog,()=>smStart);

    allSmNodes.forEach(id=>smSetNode(id,'dim'));
    allSmEdges.forEach(id=>smSetEdge(id,false));
    allSmLabels.forEach(id=>{const el=$(id);if(el)el.style.opacity='0';});

    smSetNode('sm-idle','active'); log('⚪','状态: IDLE → start_task()'); await delay(1000);

    smSetEdge('se-idle-understanding',true); smShowLabel('sl-idle-understanding');
    await animP('se-idle-understanding',600,'#8b5cf6');
    smSetNode('sm-idle','completed'); smSetNode('sm-understanding','active');
    log('🟣','状态: UNDERSTANDING'); await delay(1200);

    smSetEdge('se-understanding-exploring',true); smShowLabel('sl-understanding-exploring');
    await animP('se-understanding-exploring',600,'#f97316');
    smSetNode('sm-understanding','completed'); smSetNode('sm-exploring','active');
    log('🟠','状态: EXPLORING — RRT 探索'); await delay(2000);

    smSetEdge('se-exploring-completed',true);
    await animP('se-exploring-completed',800,'#10b981');
    smSetNode('sm-exploring','completed'); smSetNode('sm-completed','active');
    $('sm-completed').classList.add('celebrate');
    log('🟢','状态: COMPLETED — 探索完成!');
    log('🎉','explore_new_home 状态链路演示完成');
  }

  async function smPlaySearch() {
    const delay=makeDelayFn(smAbort.signal);
    const animP=makeParticleFn(smParticle,smAbort.signal);
    const log=makeLogFn(smLog,()=>smStart);

    allSmNodes.forEach(id=>smSetNode(id,'dim'));
    allSmEdges.forEach(id=>smSetEdge(id,false));
    allSmLabels.forEach(id=>{const el=$(id);if(el)el.style.opacity='0';});

    smSetNode('sm-idle','active'); log('⚪','状态: IDLE → start_task()'); await delay(1000);

    smSetEdge('se-idle-understanding',true); smShowLabel('sl-idle-understanding');
    await animP('se-idle-understanding',600,'#8b5cf6');
    smSetNode('sm-idle','completed'); smSetNode('sm-understanding','active');
    log('🟣','状态: UNDERSTANDING'); await delay(1200);

    smSetEdge('se-understanding-searching',true); smShowLabel('sl-understanding-searching');
    await animP('se-understanding-searching',600,'#ef4444');
    smSetNode('sm-understanding','completed'); smSetNode('sm-searching','active');
    log('🔴','状态: SEARCHING — 候选节点规划'); await delay(1200);

    // Loop 1
    smSetEdge('se-searching-checking',true); smShowLabel('sl-searching-checking');
    await animP('se-searching-checking',600,'#ef4444');
    smSetNode('sm-searching','idle'); smSetNode('sm-checking','active');
    log('🔴','状态: CHECKING — VLM 检测 (轮次#1)'); await delay(1200);

    // Not found → loop back
    smSetEdge('se-checking-searching',true); smShowLabel('sl-checking-searching');
    await animP('se-checking-searching',700,'#ef4444');
    smSetNode('sm-checking','idle'); smSetNode('sm-searching','active');
    log('❌','未找到 → 回到 SEARCHING'); await delay(1000);

    // Loop 2
    await animP('se-searching-checking',600,'#ef4444');
    smSetNode('sm-searching','idle'); smSetNode('sm-checking','active');
    log('🔴','状态: CHECKING — VLM 检测 (轮次#2)'); await delay(1200);

    // Found!
    smSetEdge('se-checking-completed',true);
    await animP('se-checking-completed',700,'#10b981');
    smSetNode('sm-checking','completed'); smSetNode('sm-completed','active');
    $('sm-completed').classList.add('celebrate');
    log('🟢','状态: COMPLETED — 找到目标!');
    log('🎉','locate_object 状态链路演示完成');
  }

  async function smStartChain(chain) {
    if(smPlaying) return;
    smPlaying=true; smAbort=new AbortController(); smStart=performance.now();
    ['sm-nav','sm-explore','sm-search'].forEach(id=>$(id).disabled=true);
    const map={nav:'sm-nav',explore:'sm-explore',search:'sm-search'};
    $(map[chain]).classList.add('on');
    smLog.innerHTML='';
    try {
      if(chain==='nav') await smPlayNav();
      else if(chain==='explore') await smPlayExplore();
      else if(chain==='search') await smPlaySearch();
    } catch(e){ if(e.name!=='AbortError') console.error(e); }
    smPlaying=false;
    ['sm-nav','sm-explore','sm-search'].forEach(id=>$(id).disabled=false);
  }

  $('sm-nav').addEventListener('click',()=>smStartChain('nav'));
  $('sm-explore').addEventListener('click',()=>smStartChain('explore'));
  $('sm-search').addEventListener('click',()=>smStartChain('search'));
  $('sm-reset').addEventListener('click',smReset);
  smReset();
})();
</script>
